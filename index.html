<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tap Counter & Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 80vh;
            position: relative;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            transition: transform 0.3s ease;
        }

        .page-1 {
            transform: translateX(0);
        }

        .page-2 {
            transform: translateX(100%);
        }

        .page.active {
            transform: translateX(0);
        }

        .page.inactive {
            transform: translateX(-100%);
        }

        .page-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.3);
            transition: background-color 0.3s ease;
        }

        .indicator-dot.active {
            background-color: white;
        }

        .battery-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 20px;
        }

        .battery {
            width: 50px;
            height: 120px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px;
        }

        .battery-bar {
            height: 18px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .battery-bar.active {
            background-color: #4cd964;
        }

        .counter-container,
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .counter-display {
            font-size: 40px;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .tap-button,
        .timer-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            font-size: 60px;
            font-weight: 700;
            color: white;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .timer-button.running {
            background: rgba(76, 217, 100, 0.3);
            border-color: #4cd964;
        }

        .timer-button.countdown {
            background: rgba(255, 59, 48, 0.3);
            border-color: #ff3b30;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .tap-button:active,
        .timer-button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }

        .controls,
        .timer-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 30px;
        }

        .control-button {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .reset-button {
            background-color: #ff3b30;
            color: white;
        }

        .decrease-button {
            background-color: #007aff;
            color: white;
        }

        .stop-button {
            background-color: #ff9500;
            color: white;
        }

        .control-button:active {
            transform: scale(0.95);
        }

        .instructions {
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
            opacity: 0.8;
            max-width: 300px;
        }

        .battery-label {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }

        .countdown-display {
            font-size: 18px;
            margin-top: 10px;
            min-height: 25px;
            font-weight: 600;
            text-align: center;
        }

        .sound-note {
            font-size: 13px;
            margin-top: 6px;
            min-height: 18px;
            opacity: 0.75;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="page-indicator">
        <div class="indicator-dot active" id="indicator1"></div>
        <div class="indicator-dot" id="indicator2"></div>
    </div>

    <div class="app-container" id="appContainer">
        <!-- Page 1: Counter -->
        <div class="page page-1 active" id="page1">
            <div class="page-title">Tap Counter</div>

            <div class="battery-container">
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="counter-battery1-bar1"></div>
                        <div class="battery-bar" id="counter-battery1-bar2"></div>
                        <div class="battery-bar" id="counter-battery1-bar3"></div>
                        <div class="battery-bar" id="counter-battery1-bar4"></div>
                        <div class="battery-bar" id="counter-battery1-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 1</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="counter-battery2-bar1"></div>
                        <div class="battery-bar" id="counter-battery2-bar2"></div>
                        <div class="battery-bar" id="counter-battery2-bar3"></div>
                        <div class="battery-bar" id="counter-battery2-bar4"></div>
                        <div class="battery-bar" id="counter-battery2-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 2</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="counter-battery3-bar1"></div>
                        <div class="battery-bar" id="counter-battery3-bar2"></div>
                        <div class="battery-bar" id="counter-battery3-bar3"></div>
                        <div class="battery-bar" id="counter-battery3-bar4"></div>
                        <div class="battery-bar" id="counter-battery3-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 3</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="counter-battery4-bar1"></div>
                        <div class="battery-bar" id="counter-battery4-bar2"></div>
                        <div class="battery-bar" id="counter-battery4-bar3"></div>
                        <div class="battery-bar" id="counter-battery4-bar4"></div>
                        <div class="battery-bar" id="counter-battery4-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 4</div>
                </div>
            </div>

            <div class="counter-container">
                <div class="tap-button" id="tapButton">
                    <span id="circleCounter">0</span>
                </div>
            </div>

            <div class="controls">
                <button class="control-button reset-button" id="resetButton" type="button">Reset</button>
                <button class="control-button decrease-button" id="decreaseButton" type="button">-1</button>
            </div>
        </div>

        <!-- Page 2: Timer -->
        <div class="page page-2" id="page2">
            <div class="page-title">30-Second Timer</div>

            <div class="battery-container">
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="timer-battery1-bar1"></div>
                        <div class="battery-bar" id="timer-battery1-bar2"></div>
                        <div class="battery-bar" id="timer-battery1-bar3"></div>
                        <div class="battery-bar" id="timer-battery1-bar4"></div>
                        <div class="battery-bar" id="timer-battery1-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 1</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="timer-battery2-bar1"></div>
                        <div class="battery-bar" id="timer-battery2-bar2"></div>
                        <div class="battery-bar" id="timer-battery2-bar3"></div>
                        <div class="battery-bar" id="timer-battery2-bar4"></div>
                        <div class="battery-bar" id="timer-battery2-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 2</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="timer-battery3-bar1"></div>
                        <div class="battery-bar" id="timer-battery3-bar2"></div>
                        <div class="battery-bar" id="timer-battery3-bar3"></div>
                        <div class="battery-bar" id="timer-battery3-bar4"></div>
                        <div class="battery-bar" id="timer-battery3-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 3</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="timer-battery4-bar1"></div>
                        <div class="battery-bar" id="timer-battery4-bar2"></div>
                        <div class="battery-bar" id="timer-battery4-bar3"></div>
                        <div class="battery-bar" id="timer-battery4-bar4"></div>
                        <div class="battery-bar" id="timer-battery4-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 4</div>
                </div>
            </div>

            <div class="timer-container">
                <div class="timer-button" id="timerButton">
                    <span id="timerDisplay">30</span>
                </div>
                <div class="countdown-display" id="countdownDisplay"></div>
                <div class="sound-note" id="soundNote">Tap timer once. Voice will say Ready, then 15, 14, 13...</div>
            </div>

            <div class="timer-controls">
                <button class="control-button reset-button" id="timerResetButton" type="button">Reset</button>
                <button class="control-button stop-button" id="stopButton" type="button">Stop</button>
            </div>
        </div>
    </div>

    <div class="instructions">
        Swipe in any direction to switch between Counter and Timer
    </div>

    <script>
        // Voice countdown settings
        // This version speaks "15, 14, 13..." instead of only making beep sounds.
        const USE_SPOKEN_COUNTDOWN = true;
        const USE_COUNTDOWN_BEEPS = false;
        const USE_TIME_UP_BEEP = false;
        const SPEAK_READY_ON_FIRST_START = true;

        // Counter functionality
        let count = 0;
        const circleCounter = document.getElementById('circleCounter');
        const tapButton = document.getElementById('tapButton');
        const resetButton = document.getElementById('resetButton');
        const decreaseButton = document.getElementById('decreaseButton');

        const counterBatteryBars = [];
        for (let i = 1; i <= 4; i++) {
            for (let j = 1; j <= 5; j++) {
                counterBatteryBars.push(document.getElementById(`counter-battery${i}-bar${j}`));
            }
        }

        function updateCounterBatteries() {
            const activeBars = Math.min(Math.floor(count / 5), counterBatteryBars.length);

            counterBatteryBars.forEach((bar, index) => {
                if (index < activeBars) {
                    bar.classList.add('active');
                } else {
                    bar.classList.remove('active');
                }
            });
        }

        tapButton.addEventListener('click', () => {
            count++;
            circleCounter.textContent = count;
            updateCounterBatteries();
        });

        resetButton.addEventListener('click', () => {
            count = 0;
            circleCounter.textContent = count;
            updateCounterBatteries();
        });

        decreaseButton.addEventListener('click', () => {
            if (count > 0) {
                count--;
                circleCounter.textContent = count;
                updateCounterBatteries();
            }
        });

        // Timer functionality
        let timerSeconds = 30;
        let timerInterval = null;
        let isTimerRunning = false;
        let currentCycle = 0;
        let hasSpokenReady = false;

        const timerDisplay = document.getElementById('timerDisplay');
        const countdownDisplay = document.getElementById('countdownDisplay');
        const soundNote = document.getElementById('soundNote');
        const timerButton = document.getElementById('timerButton');
        const timerResetButton = document.getElementById('timerResetButton');
        const stopButton = document.getElementById('stopButton');

        const timerBatteryBars = [];
        for (let i = 1; i <= 4; i++) {
            for (let j = 1; j <= 5; j++) {
                timerBatteryBars.push(document.getElementById(`timer-battery${i}-bar${j}`));
            }
        }

        // Optional Web Audio beep support. Beeps are OFF by default in this version.
        let audioContext = null;
        let audioUnlocked = false;

        function getAudioContext() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return null;
            if (!audioContext) audioContext = new AudioContextClass();
            return audioContext;
        }

        async function unlockAudio() {
            const context = getAudioContext();
            if (!context) return false;

            try {
                if (context.state !== 'running') {
                    await context.resume();
                }

                if (!audioUnlocked && context.state === 'running') {
                    const oscillator = context.createOscillator();
                    const gainNode = context.createGain();

                    gainNode.gain.setValueAtTime(0.0001, context.currentTime);
                    oscillator.connect(gainNode);
                    gainNode.connect(context.destination);

                    oscillator.start(context.currentTime);
                    oscillator.stop(context.currentTime + 0.05);

                    audioUnlocked = true;
                }

                return context.state === 'running';
            } catch (error) {
                console.log('Audio unlock failed:', error);
                return false;
            }
        }

        async function playTone(frequency, duration = 0.25, volume = 0.35) {
            const context = getAudioContext();
            if (!context) return;

            try {
                if (context.state !== 'running') await context.resume();
                if (context.state !== 'running') return;

                const oscillator = context.createOscillator();
                const gainNode = context.createGain();
                const startTime = context.currentTime + 0.01;
                const stopTime = startTime + duration;

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(frequency, startTime);
                gainNode.gain.setValueAtTime(volume, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, stopTime);

                oscillator.connect(gainNode);
                gainNode.connect(context.destination);
                oscillator.start(startTime);
                oscillator.stop(stopTime);
            } catch (error) {
                console.log('Audio playback error:', error);
            }
        }

        function playCountdownBeep(number) {
            if (!USE_COUNTDOWN_BEEPS) return;
            if (number > 15 || number < 1) return;

            let frequency;
            if (number <= 5) frequency = 850;
            else if (number <= 10) frequency = 650;
            else frequency = 450;

            playTone(frequency, 0.22, 0.35);
        }

        function playTimeUpBeep() {
            if (!USE_TIME_UP_BEEP) return;
            playTone(1000, 0.16, 0.4);
            setTimeout(() => playTone(1200, 0.16, 0.4), 180);
            setTimeout(() => playTone(900, 0.25, 0.4), 360);
        }

        // Speech synthesis support for iPhone Chrome/Safari.
        let selectedVoice = null;

        function loadVoices() {
            if (!('speechSynthesis' in window)) return [];

            const voices = window.speechSynthesis.getVoices() || [];
            if (!voices.length) return voices;

            selectedVoice =
                voices.find(voice => voice.lang === 'en-US' && /Samantha|Karen|Daniel|Google|English/i.test(voice.name)) ||
                voices.find(voice => voice.lang === 'en-US') ||
                voices.find(voice => voice.lang && voice.lang.toLowerCase().startsWith('en')) ||
                voices[0];

            return voices;
        }

        function prepareSpeech() {
            if (!USE_SPOKEN_COUNTDOWN) return false;

            if (!('speechSynthesis' in window) || typeof SpeechSynthesisUtterance === 'undefined') {
                soundNote.textContent = 'Voice is not supported in this browser';
                return false;
            }

            try {
                loadVoices();
                window.speechSynthesis.cancel();
                if (typeof window.speechSynthesis.resume === 'function') {
                    window.speechSynthesis.resume();
                }
                return true;
            } catch (error) {
                console.log('Speech prepare failed:', error);
                return false;
            }
        }

        function speakText(text) {
            if (!USE_SPOKEN_COUNTDOWN) return;
            if (!prepareSpeech()) return;

            try {
                const utterance = new SpeechSynthesisUtterance(String(text));
                utterance.lang = 'en-US';
                utterance.rate = 1.05;
                utterance.pitch = 1;
                utterance.volume = 1;

                loadVoices();
                if (selectedVoice) {
                    utterance.voice = selectedVoice;
                }

                utterance.onerror = event => {
                    console.log('Speech error:', event.error);
                    soundNote.textContent = 'Voice blocked. Tap timer again and check iPhone Silent Mode.';
                };

                window.speechSynthesis.speak(utterance);
            } catch (error) {
                console.log('Speech error:', error);
            }
        }

        function speakCountdown(number) {
            if (number > 15 || number < 1) return;
            speakText(number.toString());
        }

        async function prepareSoundAndVoice() {
            // iPhone needs audio/speech setup during a real tap.
            if (USE_COUNTDOWN_BEEPS || USE_TIME_UP_BEEP) {
                await unlockAudio();
            }

            prepareSpeech();
            soundNote.textContent = 'Voice enabled';

            setTimeout(() => {
                if (soundNote.textContent === 'Voice enabled') {
                    soundNote.textContent = '';
                }
            }, 1200);
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = timerSeconds;

            if (timerSeconds <= 15 && timerSeconds > 0) {
                countdownDisplay.textContent = `${timerSeconds}...`;

                if (isTimerRunning) {
                    speakCountdown(timerSeconds);
                    playCountdownBeep(timerSeconds);
                }

                if (timerSeconds <= 5) {
                    timerButton.classList.add('countdown');
                } else {
                    timerButton.classList.remove('countdown');
                }
            } else {
                countdownDisplay.textContent = '';
                timerButton.classList.remove('countdown');
            }
        }

        function updateTimerBatteries() {
            const activeBars = currentCycle % (timerBatteryBars.length + 1);

            timerBatteryBars.forEach((bar, index) => {
                if (index < activeBars) {
                    bar.classList.add('active');
                } else {
                    bar.classList.remove('active');
                }
            });
        }

        function startTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            isTimerRunning = true;
            timerButton.classList.add('running');
            timerButton.classList.remove('countdown');
            countdownDisplay.textContent = '';

            timerInterval = setInterval(() => {
                if (!isTimerRunning) return;

                timerSeconds--;

                if (timerSeconds <= 0) {
                    timerDisplay.textContent = '0';
                    countdownDisplay.textContent = "Time's up!";
                    timerButton.classList.remove('countdown');

                    speakText("Time's up");
                    playTimeUpBeep();

                    currentCycle++;
                    updateTimerBatteries();

                    timerSeconds = 30;

                    setTimeout(() => {
                        if (isTimerRunning) updateTimerDisplay();
                    }, 300);

                    return;
                }

                updateTimerDisplay();
            }, 1000);
        }

        async function handleTimerButtonClick() {
            await prepareSoundAndVoice();

            if (!isTimerRunning) {
                if (SPEAK_READY_ON_FIRST_START && !hasSpokenReady) {
                    speakText('Ready');
                    hasSpokenReady = true;
                }

                startTimer();
            }
        }

        timerButton.addEventListener('click', handleTimerButtonClick);

        stopButton.addEventListener('click', () => {
            if (isTimerRunning) {
                isTimerRunning = false;
                timerButton.classList.remove('running');
                timerButton.classList.remove('countdown');
                countdownDisplay.textContent = 'Paused';

                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }

                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }
            }
        });

        timerResetButton.addEventListener('click', () => {
            isTimerRunning = false;
            timerButton.classList.remove('running');
            timerButton.classList.remove('countdown');

            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            timerSeconds = 30;
            currentCycle = 0;
            hasSpokenReady = false;
            updateTimerDisplay();
            updateTimerBatteries();
            countdownDisplay.textContent = '';
            soundNote.textContent = 'Tap timer once. Voice will say Ready, then 15, 14, 13...';

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        });

        if ('speechSynthesis' in window) {
            loadVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                loadVoices();
            };
        }

        // Extra iPhone support: prepare speech on first real tap anywhere.
        document.addEventListener('touchend', () => {
            prepareSpeech();
        }, { once: true, passive: true });

        document.addEventListener('click', () => {
            prepareSpeech();
        }, { once: true });

        // Swipe navigation
        const appContainer = document.getElementById('appContainer');
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const indicator1 = document.getElementById('indicator1');
        const indicator2 = document.getElementById('indicator2');

        let startX = 0;
        let currentPage = 1;

        appContainer.addEventListener('touchstart', (event) => {
            startX = event.touches[0].clientX;
        }, { passive: true });

        appContainer.addEventListener('touchend', (event) => {
            const endX = event.changedTouches[0].clientX;
            const diffX = startX - endX;

            if (Math.abs(diffX) > 50) {
                if (currentPage === 1) switchPage(2);
                else switchPage(1);
            }
        }, { passive: true });

        function switchPage(pageNumber) {
            if (pageNumber === 1) {
                page1.classList.remove('inactive');
                page1.classList.add('active');
                page2.classList.remove('active');
                page2.classList.add('inactive');
                indicator1.classList.add('active');
                indicator2.classList.remove('active');
                currentPage = 1;
            } else {
                page1.classList.remove('active');
                page1.classList.add('inactive');
                page2.classList.remove('inactive');
                page2.classList.add('active');
                indicator1.classList.remove('active');
                indicator2.classList.add('active');
                currentPage = 2;
            }
        }

        updateCounterBatteries();
        updateTimerDisplay();
        updateTimerBatteries();
    </script>
</body>
</html>
