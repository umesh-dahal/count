<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Timer" />
  <meta name="theme-color" content="#111827" />

  <title>30s Battery Timer – Deutsch</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.42), transparent 30%),
        radial-gradient(circle at bottom right, rgba(34,197,94,0.28), transparent 34%),
        linear-gradient(135deg, #0f172a 0%, #111827 48%, #020617 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 720px;
      border-radius: 34px;
      padding: 24px 18px 22px;
      background: rgba(255,255,255,0.095);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 30px 70px rgba(0,0,0,0.38);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      position: relative;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: rgba(37,99,235,0.35);
      filter: blur(45px);
      top: -70px;
      right: -80px;
      pointer-events: none;
    }

    .header {
      width: 100%;
      text-align: center;
      z-index: 1;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.58);
      margin-bottom: 8px;
      font-weight: 700;
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.05;
    }

    .subtitle {
      margin-top: 8px;
      color: rgba(255,255,255,0.66);
      font-size: 14px;
    }

    .battery-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      z-index: 1;
    }

    .battery-card {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 22px;
      padding: 10px 8px 9px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .battery-top {
      width: 28px;
      height: 6px;
      margin: 0 auto 6px;
      border-radius: 999px 999px 0 0;
      background: rgba(255,255,255,0.35);
    }

    .battery {
      height: 142px;
      border-radius: 15px;
      padding: 7px;
      border: 2px solid rgba(255,255,255,0.30);
      display: flex;
      flex-direction: column-reverse;
      gap: 5px;
      background: rgba(15,23,42,0.42);
      overflow: hidden;
    }

    .battery-bar {
      flex: 1;
      border-radius: 7px;
      background: rgba(255,255,255,0.15);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      transition: all 0.28s ease;
    }

    .battery-bar.active {
      background: linear-gradient(135deg, #22c55e, #84cc16);
      box-shadow: 0 0 14px rgba(34,197,94,0.65);
    }

    .battery-label {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.62);
      font-weight: 600;
    }

    .timer-zone {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 1;
      gap: 15px;
    }

    .timer-button {
      width: 245px;
      height: 245px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.20);
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,0.36), transparent 22%),
        linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.07));
      box-shadow:
        0 24px 46px rgba(0,0,0,0.38),
        inset 0 1px 0 rgba(255,255,255,0.25),
        inset 0 -18px 35px rgba(0,0,0,0.14);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.16s ease, border 0.18s ease, background 0.18s ease;
      position: relative;
    }

    .timer-button:active {
      transform: scale(0.965);
    }

    .timer-button.running {
      border-color: rgba(34,197,94,0.85);
      box-shadow:
        0 24px 46px rgba(0,0,0,0.38),
        0 0 38px rgba(34,197,94,0.32),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .timer-button.paused {
      border-color: rgba(245,158,11,0.85);
      box-shadow:
        0 24px 46px rgba(0,0,0,0.38),
        0 0 34px rgba(245,158,11,0.25),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .timer-button.ending {
      border-color: rgba(239,68,68,0.9);
      animation: pulse 1s infinite;
      box-shadow:
        0 24px 46px rgba(0,0,0,0.38),
        0 0 38px rgba(239,68,68,0.36),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.035); }
    }

    .timer-number {
      font-size: 88px;
      font-weight: 900;
      letter-spacing: -3px;
      line-height: 1;
      text-shadow: 0 4px 18px rgba(0,0,0,0.34);
    }

    .timer-small {
      margin-top: 9px;
      font-size: 14px;
      color: rgba(255,255,255,0.68);
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .status-text {
      min-height: 26px;
      font-size: 18px;
      color: rgba(255,255,255,0.82);
      font-weight: 700;
      text-align: center;
    }

    .voice-note {
      min-height: 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.54);
      text-align: center;
    }

    .controls {
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 1;
    }

    .reset-button {
      border: 0;
      border-radius: 999px;
      padding: 16px 36px;
      color: white;
      background: rgba(239,68,68,0.92);
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(239,68,68,0.25);
      cursor: pointer;
      touch-action: manipulation;
    }

    .reset-button:active {
      transform: scale(0.96);
    }

    .hint {
      font-size: 13px;
      color: rgba(255,255,255,0.48);
      text-align: center;
      z-index: 1;
      line-height: 1.35;
      padding: 0 10px;
    }

    @media (max-height: 720px) {
      body { padding: 12px; }
      .app { min-height: calc(100vh - 24px); gap: 14px; padding: 18px 14px; }
      h1 { font-size: 25px; }
      .subtitle { display: none; }
      .battery { height: 118px; }
      .timer-button { width: 210px; height: 210px; }
      .timer-number { font-size: 74px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="glow"></div>

    <header class="header">
      <div class="eyebrow">Fokus Timer</div>
      <h1>30-Sekunden Batterie-Timer</h1>
      <div class="subtitle">Tippe auf den Kreis, um zu starten, pausieren und fortzusetzen.</div>
    </header>

    <section class="battery-grid" id="batteryGrid" aria-label="Batterie-Fortschritt">
      <div class="battery-card">
        <div class="battery-top"></div>
        <div class="battery" id="battery1"></div>
        <div class="battery-label">Batterie 1</div>
      </div>
      <div class="battery-card">
        <div class="battery-top"></div>
        <div class="battery" id="battery2"></div>
        <div class="battery-label">Batterie 2</div>
      </div>
      <div class="battery-card">
        <div class="battery-top"></div>
        <div class="battery" id="battery3"></div>
        <div class="battery-label">Batterie 3</div>
      </div>
      <div class="battery-card">
        <div class="battery-top"></div>
        <div class="battery" id="battery4"></div>
        <div class="battery-label">Batterie 4</div>
      </div>
    </section>

    <section class="timer-zone">
      <button class="timer-button" id="timerButton" type="button" aria-label="Start Pause Fortsetzen Timer">
        <span class="timer-number" id="timerDisplay">30</span>
        <span class="timer-small" id="timerSmall">Zum Starten tippen</span>
      </button>
      <div class="status-text" id="statusText">Bereit</div>
      <div class="voice-note" id="voiceNote">Sprachausgabe zählt jede Sekunde von 30 bis 1.</div>
    </section>

    <section class="controls">
      <button class="reset-button" id="resetButton" type="button">Zurücksetzen</button>
    </section>

    <div class="hint">Jede abgeschlossene 30-Sekunden-Runde füllt einen Balken. 4 Batterien × 6 Balken = 24 Runden.</div>
  </main>

  <script>
    const ROUND_SECONDS = 30;
    const BATTERY_COUNT = 4;
    const BARS_PER_BATTERY = 6;
    const TOTAL_BARS = BATTERY_COUNT * BARS_PER_BATTERY;
    const SPEECH_RATE = 1.3; // 1.25x speed

    let timerSeconds = ROUND_SECONDS;
    let completedRounds = 0;
    let isRunning = false;
    let isWaitingForSpeech = false;
    let hasSpokenReady = false;
    let selectedVoice = null;
    let speechQueue = [];
    let isSpeaking = false;

    const timerButton = document.getElementById('timerButton');
    const timerDisplay = document.getElementById('timerDisplay');
    const timerSmall = document.getElementById('timerSmall');
    const statusText = document.getElementById('statusText');
    const voiceNote = document.getElementById('voiceNote');
    const resetButton = document.getElementById('resetButton');

    const batteryBars = [];

    function createBatteryBars() {
      for (let battery = 1; battery <= BATTERY_COUNT; battery++) {
        const batteryElement = document.getElementById('battery' + battery);
        batteryElement.innerHTML = '';

        for (let bar = 1; bar <= BARS_PER_BATTERY; bar++) {
          const barElement = document.createElement('div');
          barElement.className = 'battery-bar';
          batteryElement.appendChild(barElement);
          batteryBars.push(barElement);
        }
      }
    }

    function loadVoices() {
      if (!('speechSynthesis' in window)) return;

      const voices = window.speechSynthesis.getVoices() || [];
      if (!voices.length) return;

      selectedVoice =
        voices.find(v => v.lang === 'de-DE') ||
        voices.find(v => v.lang.startsWith('de')) ||
        voices[0];
    }

    function prepareSpeech() {
      if (!('speechSynthesis' in window) || typeof SpeechSynthesisUtterance === 'undefined') {
        voiceNote.textContent = 'Sprache wird in diesem Browser nicht unterstützt.';
        return false;
      }

      try {
        loadVoices();
        if (typeof window.speechSynthesis.resume === 'function') {
          window.speechSynthesis.resume();
        }
        return true;
      } catch (error) {
        console.log('Speech prepare failed:', error);
        return false;
      }
    }

    function processSpeechQueue() {
      if (isSpeaking || speechQueue.length === 0) {
        // If queue is empty and we're waiting for speech, we can continue
        if (!isSpeaking && speechQueue.length === 0 && isWaitingForSpeech) {
          isWaitingForSpeech = false;
          // Speech is done, continue to next number
          countdownNext();
        }
        return;
      }
      
      isSpeaking = true;
      const text = speechQueue.shift();
      
      try {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'de-DE';
        utterance.rate = SPEECH_RATE;
        utterance.pitch = 1;
        utterance.volume = 1;

        loadVoices();
        if (selectedVoice) utterance.voice = selectedVoice;

        utterance.onend = function() {
          isSpeaking = false;
          // If we're waiting for speech to finish, trigger next countdown
          if (isWaitingForSpeech) {
            isWaitingForSpeech = false;
            countdownNext();
          }
          processSpeechQueue();
        };

        utterance.onerror = function(event) {
          console.log('Speech error:', event.error);
          isSpeaking = false;
          if (isWaitingForSpeech) {
            isWaitingForSpeech = false;
            countdownNext();
          }
          processSpeechQueue();
        };

        window.speechSynthesis.speak(utterance);
      } catch (error) {
        console.log('Speech error:', error);
        isSpeaking = false;
        if (isWaitingForSpeech) {
          isWaitingForSpeech = false;
          countdownNext();
        }
        processSpeechQueue();
      }
    }

    function speakText(text) {
      if (!prepareSpeech()) return;

      try {
        window.speechSynthesis.cancel();
        isSpeaking = false;
        speechQueue = [];
        
        speechQueue.push(text);
        processSpeechQueue();
      } catch (error) {
        console.log('Speech error:', error);
      }
    }

    function speakNumber(number) {
      if (number <= 0 || number > ROUND_SECONDS) {
        // If number is 0 or invalid, just continue
        if (isWaitingForSpeech) {
          isWaitingForSpeech = false;
          countdownNext();
        }
        return;
      }

      // Deutsche Zahlen 1-30
      const germanNumbers = {
        1: 'eins', 2: 'zwei', 3: 'drei', 4: 'vier', 5: 'fünf',
        6: 'sechs', 7: 'sieben', 8: 'acht', 9: 'neun', 10: 'zehn',
        11: 'elf', 12: 'zwölf', 13: 'dreizehn', 14: 'vierzehn', 15: 'fünfzehn',
        16: 'sechzehn', 17: 'siebzehn', 18: 'achtzehn', 19: 'neunzehn', 20: 'zwanzig',
        21: 'einundzwanzig', 22: 'zweiundzwanzig', 23: 'dreiundzwanzig', 24: 'vierundzwanzig', 25: 'fünfundzwanzig',
        26: 'sechsundzwanzig', 27: 'siebenundzwanzig', 28: 'achtundzwanzig', 29: 'neunundzwanzig', 30: 'dreißig'
      };

      const word = germanNumbers[number] || number.toString();
      
      if (!prepareSpeech()) return;

      try {
        // Don't cancel if we're just adding to queue
        if (!isSpeaking) {
          window.speechSynthesis.cancel();
          speechQueue = [];
        }
        
        speechQueue.push(word);
        processSpeechQueue();
      } catch (error) {
        console.log('Speech error:', error);
        if (isWaitingForSpeech) {
          isWaitingForSpeech = false;
          countdownNext();
        }
      }
    }

    function updateBatteryBars() {
      const activeBars = completedRounds % (TOTAL_BARS + 1);

      batteryBars.forEach((bar, index) => {
        if (index < activeBars) bar.classList.add('active');
        else bar.classList.remove('active');
      });

      if (completedRounds > 0 && activeBars === 0) {
        setTimeout(() => {
          batteryBars.forEach(bar => bar.classList.remove('active'));
        }, 250);
      }
    }

    function updateTimerVisual() {
      timerDisplay.textContent = timerSeconds;

      timerButton.classList.remove('running', 'paused', 'ending');

      if (isRunning) {
        timerButton.classList.add('running');
        timerSmall.textContent = 'Zum Pausieren tippen';
        statusText.textContent = timerSeconds <= 5 ? 'Fast geschafft' : 'Läuft';
      } else if (timerSeconds !== ROUND_SECONDS) {
        timerButton.classList.add('paused');
        timerSmall.textContent = 'Zum Fortsetzen tippen';
        statusText.textContent = 'Pausiert';
      } else {
        timerSmall.textContent = 'Zum Starten tippen';
        statusText.textContent = 'Bereit';
      }

      if (isRunning && timerSeconds <= 5) {
        timerButton.classList.add('ending');
      }
    }

    function countdownNext() {
      if (!isRunning) return;

      timerSeconds--;

      if (timerSeconds > 0) {
        updateTimerVisual();
        // Speak the number and wait for it to finish
        isWaitingForSpeech = true;
        speakNumber(timerSeconds);
        // The next countdown will be triggered when speech finishes
      } else {
        // Timer reached 0
        timerDisplay.textContent = '0';
        statusText.textContent = 'Zeit ist um!';
        timerButton.classList.remove('ending');
        speakText('Zeit ist um!');

        completedRounds++;
        updateBatteryBars();

        setTimeout(() => {
          if (!isRunning) return;
          timerSeconds = ROUND_SECONDS;
          updateTimerVisual();
          // Start the next round with speaking
          isWaitingForSpeech = true;
          speakNumber(timerSeconds);
        }, 400);
      }
    }

    function startTimer() {
      isRunning = true;
      updateTimerVisual();
      
      // Start the countdown with the current number
      isWaitingForSpeech = true;
      speakNumber(timerSeconds);
    }

    async function handleTimerTap() {
      prepareSpeech();
      voiceNote.textContent = 'Sprachausgabe aktiv (1.25x)';

      setTimeout(() => {
        if (voiceNote.textContent === 'Sprachausgabe aktiv (1.25x)') {
          voiceNote.textContent = 'Sprachausgabe zählt jede Sekunde von 30 bis 1.';
        }
      }, 1200);

      if (!isRunning) {
        if (!hasSpokenReady && timerSeconds === ROUND_SECONDS) {
          speakText('Los geht\'s');
          hasSpokenReady = true;
          setTimeout(() => {
            if (isRunning) {
              isWaitingForSpeech = true;
              speakNumber(timerSeconds);
            }
          }, 400);
        } else {
          if (!isWaitingForSpeech) {
            isWaitingForSpeech = true;
            speakNumber(timerSeconds);
          }
        }

        startTimer();
      } else {
        isRunning = false;
        isWaitingForSpeech = false;
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          isSpeaking = false;
          speechQueue = [];
        }
        updateTimerVisual();
      }
    }

    function resetTimer() {
      isRunning = false;
      isWaitingForSpeech = false;

      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
        speechQueue = [];
      }

      timerSeconds = ROUND_SECONDS;
      completedRounds = 0;
      hasSpokenReady = false;
      updateBatteryBars();
      updateTimerVisual();
      voiceNote.textContent = 'Sprachausgabe zählt jede Sekunde von 30 bis 1.';
    }

    timerButton.addEventListener('click', handleTimerTap);
    resetButton.addEventListener('click', resetTimer);

    document.addEventListener('touchend', () => prepareSpeech(), { once: true, passive: true });
    document.addEventListener('click', () => prepareSpeech(), { once: true });

    if ('speechSynthesis' in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    createBatteryBars();
    updateBatteryBars();
    updateTimerVisual();
  </script>
</body>
</html>
