<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap Counter & Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
            overflow: hidden;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 80vh;
            position: relative;
            overflow: hidden;
        }
        
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            transition: transform 0.3s ease;
        }
        
        .page-1 {
            transform: translateX(0);
        }
        
        .page-2 {
            transform: translateX(100%);
        }
        
        .page.active {
            transform: translateX(0);
        }
        
        .page.inactive {
            transform: translateX(-100%);
        }
        
        .page-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.3);
            transition: background-color 0.3s ease;
        }
        
        .indicator-dot.active {
            background-color: white;
        }
        
        .battery-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 20px;
        }
        
        .battery {
            width: 50px;
            height: 120px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px;
        }
        
        .battery-bar {
            height: 18px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }
        
        .battery-bar.active {
            background-color: #4cd964;
        }
        
        .counter-container, .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }
        
        .counter-display {
            font-size: 40px;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            opacity: 0.8;
        }
        
        .tap-button, .timer-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            font-size: 60px;
            font-weight: 700;
            color: white;
        }
        
        .timer-button.running {
            background: rgba(76, 217, 100, 0.3);
            border-color: #4cd964;
        }
        
        .timer-button.countdown {
            background: rgba(255, 59, 48, 0.3);
            border-color: #ff3b30;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .tap-button:active, .timer-button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 30px;
        }
        
        .timer-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 30px;
        }
        
        .control-button {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .reset-button {
            background-color: #ff3b30;
            color: white;
        }
        
        .decrease-button {
            background-color: #007aff;
            color: white;
        }
        
        .stop-button {
            background-color: #ff9500;
            color: white;
        }
        
        .audio-button {
            background-color: #5856d6;
            color: white;
            margin-top: 10px;
        }
        
        .control-button:active {
            transform: scale(0.95);
        }
        
        .instructions {
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
            opacity: 0.8;
            max-width: 300px;
        }
        
        .battery-label {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .countdown-display {
            font-size: 18px;
            margin-top: 10px;
            min-height: 25px;
            font-weight: 600;
            text-align: center;
        }
        
        .audio-status {
            font-size: 14px;
            margin-top: 5px;
            text-align: center;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="page-indicator">
        <div class="indicator-dot active" id="indicator1"></div>
        <div class="indicator-dot" id="indicator2"></div>
    </div>
    
    <div class="app-container" id="appContainer">
        <!-- Page 1: Counter -->
        <div class="page page-1 active" id="page1">
            <div class="page-title">Tap Counter</div>
            
            <div class="battery-container">
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="counter-battery1-bar1"></div>
                        <div class="battery-bar" id="counter-battery1-bar2"></div>
                        <div class="battery-bar" id="counter-battery1-bar3"></div>
                        <div class="battery-bar" id="counter-battery1-bar4"></div>
                        <div class="battery-bar" id="counter-battery1-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 1</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="counter-battery2-bar1"></div>
                        <div class="battery-bar" id="counter-battery2-bar2"></div>
                        <div class="battery-bar" id="counter-battery2-bar3"></div>
                        <div class="battery-bar" id="counter-battery2-bar4"></div>
                        <div class="battery-bar" id="counter-battery2-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 2</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="counter-battery3-bar1"></div>
                        <div class="battery-bar" id="counter-battery3-bar2"></div>
                        <div class="battery-bar" id="counter-battery3-bar3"></div>
                        <div class="battery-bar" id="counter-battery3-bar4"></div>
                        <div class="battery-bar" id="counter-battery3-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 3</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="counter-battery4-bar1"></div>
                        <div class="battery-bar" id="counter-battery4-bar2"></div>
                        <div class="battery-bar" id="counter-battery4-bar3"></div>
                        <div class="battery-bar" id="counter-battery4-bar4"></div>
                        <div class="battery-bar" id="counter-battery4-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 4</div>
                </div>
            </div>
            
            <div class="counter-container">
                <div class="tap-button" id="tapButton">
                    <span id="circleCounter">0</span>
                </div>
            </div>
            
            <div class="controls">
                <button class="control-button reset-button" id="resetButton">Reset</button>
                <button class="control-button decrease-button" id="decreaseButton">-1</button>
            </div>
        </div>
        
        <!-- Page 2: Timer -->
        <div class="page page-2" id="page2">
            <div class="page-title">30-Second Timer</div>
            
            <div class="battery-container">
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="timer-battery1-bar1"></div>
                        <div class="battery-bar" id="timer-battery1-bar2"></div>
                        <div class="battery-bar" id="timer-battery1-bar3"></div>
                        <div class="battery-bar" id="timer-battery1-bar4"></div>
                        <div class="battery-bar" id="timer-battery1-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 1</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="timer-battery2-bar1"></div>
                        <div class="battery-bar" id="timer-battery2-bar2"></div>
                        <div class="battery-bar" id="timer-battery2-bar3"></div>
                        <div class="battery-bar" id="timer-battery2-bar4"></div>
                        <div class="battery-bar" id="timer-battery2-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 2</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="timer-battery3-bar1"></div>
                        <div class="battery-bar" id="timer-battery3-bar2"></div>
                        <div class="battery-bar" id="timer-battery3-bar3"></div>
                        <div class="battery-bar" id="timer-battery3-bar4"></div>
                        <div class="battery-bar" id="timer-battery3-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 3</div>
                </div>
                <div class="battery-wrapper">
                    <div class="battery">
                        <div class="battery-bar" id="timer-battery4-bar1"></div>
                        <div class="battery-bar" id="timer-battery4-bar2"></div>
                        <div class="battery-bar" id="timer-battery4-bar3"></div>
                        <div class="battery-bar" id="timer-battery4-bar4"></div>
                        <div class="battery-bar" id="timer-battery4-bar5"></div>
                    </div>
                    <div class="battery-label">Battery 4</div>
                </div>
            </div>
            
            <div class="timer-container">
                <div class="timer-button" id="timerButton">
                    <span id="timerDisplay">30</span>
                </div>
                <div class="countdown-display" id="countdownDisplay"></div>
                <button class="control-button audio-button" id="enableAudio">Enable Sound</button>
                <div class="audio-status" id="audioStatus">Sound: Disabled</div>
            </div>
            
            <div class="timer-controls">
                <button class="control-button reset-button" id="timerResetButton">Reset</button>
                <button class="control-button stop-button" id="stopButton">Stop</button>
            </div>
        </div>
    </div>
    
    <div class="instructions">
        Swipe in any direction to switch between Counter and Timer
    </div>

    <script>
        // Counter functionality
        let count = 0;
        const circleCounter = document.getElementById('circleCounter');
        const tapButton = document.getElementById('tapButton');
        const resetButton = document.getElementById('resetButton');
        const decreaseButton = document.getElementById('decreaseButton');
        
        // Create array of all counter battery bars (4 batteries with 5 bars each)
        const counterBatteryBars = [];
        for (let i = 1; i <= 4; i++) {
            for (let j = 1; j <= 5; j++) {
                counterBatteryBars.push(document.getElementById(`counter-battery${i}-bar${j}`));
            }
        }

        // Update counter battery bars based on count (each bar = 5 taps)
        function updateCounterBatteries() {
            const activeBars = Math.floor(count / 5);
            
            counterBatteryBars.forEach((bar, index) => {
                if (index < activeBars) {
                    bar.classList.add('active');
                } else {
                    bar.classList.remove('active');
                }
            });
        }

        // Increase count when tap button is clicked
        tapButton.addEventListener('click', () => {
            count++;
            circleCounter.textContent = count;
            updateCounterBatteries();
        });

        // Reset count when reset button is clicked
        resetButton.addEventListener('click', () => {
            count = 0;
            circleCounter.textContent = count;
            updateCounterBatteries();
        });

        // Decrease count when decrease button is clicked
        decreaseButton.addEventListener('click', () => {
            if (count > 0) {
                count--;
                circleCounter.textContent = count;
                updateCounterBatteries();
            }
        });

        // Timer functionality
        let timerSeconds = 30;
        let timerInterval = null;
        let isTimerRunning = false;
        let currentCycle = 0;
        let audioEnabled = false;
        const timerDisplay = document.getElementById('timerDisplay');
        const countdownDisplay = document.getElementById('countdownDisplay');
        const timerButton = document.getElementById('timerButton');
        const timerResetButton = document.getElementById('timerResetButton');
        const stopButton = document.getElementById('stopButton');
        const enableAudioButton = document.getElementById('enableAudio');
        const audioStatus = document.getElementById('audioStatus');
        
        // Create array of all timer battery bars (4 batteries with 5 bars each)
        const timerBatteryBars = [];
        for (let i = 1; i <= 4; i++) {
            for (let j = 1; j <= 5; j++) {
                timerBatteryBars.push(document.getElementById(`timer-battery${i}-bar${j}`));
            }
        }

        // Enable audio function
        function enableAudio() {
            if (!audioEnabled) {
                // Create and start audio context on user gesture
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioContext = new AudioContext();
                
                // Resume audio context (required for iOS)
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                // Test sound
                playTestSound(audioContext);
                audioEnabled = true;
                audioStatus.textContent = "Sound: Enabled ✓";
                enableAudioButton.textContent = "Sound Enabled";
                enableAudioButton.style.backgroundColor = '#4cd964';
            }
        }

        // Play test sound to verify audio works
        function playTestSound(audioContext) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // Play countdown sound
        function playCountdownSound(number) {
            if (!audioEnabled) return;
            
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioContext = new AudioContext();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            // Different frequencies for different numbers
            let frequency;
            if (number <= 5) {
                frequency = 800; // High pitch for last 5 seconds
            } else if (number <= 10) {
                frequency = 600; // Medium-high pitch
            } else {
                frequency = 400; // Lower pitch for higher numbers
            }
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
            
            // Configure volume envelope
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // Play the sound
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // Speak the countdown number
        function speakCountdown(number) {
            if (audioEnabled && 'speechSynthesis' in window) {
                // Cancel any previous speech
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(number.toString());
                utterance.rate = 1.2;
                utterance.pitch = 1;
                utterance.volume = 0.7;
                window.speechSynthesis.speak(utterance);
            }
        }

        // Update timer display and handle countdown
        function updateTimerDisplay() {
            timerDisplay.textContent = timerSeconds;
            
            // Show countdown text for last 10 seconds
            if (timerSeconds <= 10) {
                countdownDisplay.textContent = `${timerSeconds}...`;
                
                if (audioEnabled) {
                    playCountdownSound(timerSeconds);
                    speakCountdown(timerSeconds);
                }
                
                // Add visual effect for countdown
                if (timerSeconds <= 5) {
                    timerButton.classList.add('countdown');
                }
            } else {
                countdownDisplay.textContent = '';
                timerButton.classList.remove('countdown');
            }
        }

        // Update timer battery bars (each bar = 30 seconds in a cycle)
        function updateTimerBatteries() {
            const activeBars = currentCycle % 20; // 4 batteries × 5 bars = 20 total bars
            
            timerBatteryBars.forEach((bar, index) => {
                if (index < activeBars) {
                    bar.classList.add('active');
                } else {
                    bar.classList.remove('active');
                }
            });
        }

        // Enable audio button
        enableAudioButton.addEventListener('click', enableAudio);

        // Start/Stop timer when timer button is clicked
        timerButton.addEventListener('click', () => {
            if (!isTimerRunning) {
                // Start timer
                isTimerRunning = true;
                timerButton.classList.add('running');
                timerInterval = setInterval(() => {
                    timerSeconds--;
                    updateTimerDisplay();
                    
                    // When timer reaches 0, reset to 30 and increment cycle
                    if (timerSeconds === 0) {
                        timerSeconds = 30;
                        currentCycle++;
                        updateTimerBatteries();
                        
                        // Play completion sound
                        if (audioEnabled) {
                            playCountdownSound(0);
                            if ('speechSynthesis' in window) {
                                const utterance = new SpeechSynthesisUtterance("Time's up!");
                                window.speechSynthesis.speak(utterance);
                            }
                        }
                    }
                }, 1000);
            }
        });

        // Stop timer when stop button is clicked
        stopButton.addEventListener('click', () => {
            if (isTimerRunning) {
                isTimerRunning = false;
                timerButton.classList.remove('running');
                timerButton.classList.remove('countdown');
                countdownDisplay.textContent = 'Paused';
                clearInterval(timerInterval);
            }
        });

        // Reset timer when reset button is clicked
        timerResetButton.addEventListener('click', () => {
            isTimerRunning = false;
            timerButton.classList.remove('running');
            timerButton.classList.remove('countdown');
            clearInterval(timerInterval);
            timerSeconds = 30;
            currentCycle = 0;
            updateTimerDisplay();
            updateTimerBatteries();
            countdownDisplay.textContent = '';
        });

        // Swipe navigation - improved for both directions
        const appContainer = document.getElementById('appContainer');
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const indicator1 = document.getElementById('indicator1');
        const indicator2 = document.getElementById('indicator2');
        
        let startX = 0;
        let currentPage = 1;

        appContainer.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
        });

        appContainer.addEventListener('touchend', (e) => {
            const endX = e.changedTouches[0].clientX;
            const diffX = startX - endX;
            
            // Minimum swipe distance
            if (Math.abs(diffX) > 50) {
                // Always switch to the other page regardless of swipe direction
                if (currentPage === 1) {
                    switchPage(2);
                } else {
                    switchPage(1);
                }
            }
        });

        function switchPage(pageNumber) {
            if (pageNumber === 1) {
                page1.classList.remove('inactive');
                page1.classList.add('active');
                page2.classList.remove('active');
                page2.classList.add('inactive');
                indicator1.classList.add('active');
                indicator2.classList.remove('active');
                currentPage = 1;
            } else {
                page1.classList.remove('active');
                page1.classList.add('inactive');
                page2.classList.remove('inactive');
                page2.classList.add('active');
                indicator1.classList.remove('active');
                indicator2.classList.add('active');
                currentPage = 2;
            }
        }

        // Initialize both pages
        updateCounterBatteries();
        updateTimerDisplay();
        updateTimerBatteries();
    </script>
</body>
</html>
